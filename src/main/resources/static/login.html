<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Employee Management Login</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--primary: #2f4ceb;
			--primary-dark: #1e3dd4;
			--accent: #9d7bff;
			--text-primary: #0f172a;
			--text-muted: #5f6b7c;
			--border-color: rgba(15, 23, 42, 0.12);
			--gradient-bg: linear-gradient(120deg, rgba(47, 76, 235, 0.12), rgba(255, 255, 255, 0.65));
			--gradient-card: linear-gradient(135deg, #ffffff 0%, #f8f9ff 45%, #eef2ff 100%);
		}

		*, *::before, *::after {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			background: #eef2ff;
			color: var(--text-primary);
		}

		.login-shell {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 48px 24px;
			background-image: radial-gradient(circle at 10% 20%, rgba(47, 76, 235, 0.18), transparent 45%), radial-gradient(circle at 90% 20%, rgba(179, 107, 255, 0.16), transparent 40%), radial-gradient(circle at 20% 80%, rgba(23, 162, 184, 0.2), transparent 45%);
		}

		.login-card {
			width: min(1100px, 100%);
			background: rgba(255, 255, 255, 0.95);
			border-radius: 32px;
			box-shadow: 0 35px 90px rgba(15, 23, 42, 0.18);
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
			overflow: hidden;
			border: 1px solid rgba(255, 255, 255, 0.5);
		}

		.login-hero {
			padding: 48px;
			background: var(--gradient-card);
			position: relative;
			overflow: hidden;
		}

		.login-hero::after {
			content: '';
			position: absolute;
			inset: 18px;
			border-radius: 28px;
			border: 1px solid rgba(255, 255, 255, 0.4);
			pointer-events: none;
		}

		.aurora {
			position: absolute;
			inset: 0;
			background: radial-gradient(circle, rgba(47, 76, 235, 0.25) 15%, transparent 60%);
			filter: blur(40px);
			opacity: 0.8;
		}

		.login-hero-content {
			position: relative;
			z-index: 1;
		}

		.trust-chip {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 10px 18px;
			background: rgba(255, 255, 255, 0.7);
			border-radius: 999px;
			font-weight: 600;
			font-size: 0.9rem;
			color: var(--text-primary);
			margin-bottom: 18px;
			box-shadow: 0 10px 30px rgba(47, 76, 235, 0.18);
		}

		.login-hero h1 {
			font-size: clamp(2rem, 2.8vw, 2.8rem);
			margin: 0 0 16px;
			color: var(--text-primary);
		}

		.login-hero p {
			margin: 0;
			color: var(--text-muted);
			font-size: 1rem;
			line-height: 1.6;
		}

		.hero-metrics {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
			gap: 16px;
			margin-top: 32px;
		}

		.metric-card {
			padding: 18px;
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.85);
			box-shadow: 0 15px 40px rgba(15, 23, 42, 0.08);
			border: 1px solid rgba(15, 23, 42, 0.08);
		}

		.metric-card span {
			display: block;
			font-size: 0.8rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: var(--text-muted);
			margin-bottom: 6px;
		}

		.metric-card strong {
			font-size: 1.4rem;
			color: var(--text-primary);
		}

		.login-form-pane {
			padding: 48px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #ffffff;
		}

		.login-form {
			width: min(440px, 100%);
		}

		.brand-badge {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 6px 14px;
			border-radius: 999px;
			background: rgba(47, 76, 235, 0.1);
			color: var(--primary);
			font-weight: 600;
			font-size: 0.9rem;
			margin-bottom: 20px;
		}

		.login-form h2 {
			font-size: 1.9rem;
			margin: 0;
		}

		.login-form p {
			color: var(--text-muted);
			margin: 8px 0 28px;
		}

		label {
			display: block;
			font-size: 0.9rem;
			font-weight: 600;
			margin-bottom: 8px;
			color: var(--text-primary);
		}

		.input-field {
			width: 100%;
			padding: 13px 16px;
			border-radius: 14px;
			border: 1px solid var(--border-color);
			font-size: 1rem;
			background: #f9f9fb;
			color: var(--text-primary);
			transition: border 0.2s ease, box-shadow 0.2s ease;
		}

		.input-field:focus {
			outline: none;
			border-color: var(--primary);
			box-shadow: 0 0 0 3px rgba(47, 76, 235, 0.15);
			background: #ffffff;
		}

		.field-group {
			margin-bottom: 22px;
		}

		.password-container {
			position: relative;
		}

		.password-container .input-field {
			padding-right: 52px;
		}

		.toggle-password {
			position: absolute;
			top: 50%;
			right: 12px;
			transform: translateY(-50%);
			width: 36px;
			height: 36px;
			border-radius: 50%;
			border: none;
			background: rgba(47, 76, 235, 0.08);
			color: var(--primary);
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: background 0.2s ease, color 0.2s ease;
		}

		.toggle-password:hover {
			background: rgba(47, 76, 235, 0.15);
		}

		.toggle-password svg {
			width: 20px;
			height: 20px;
			stroke: currentColor;
			fill: none;
		}

		.toggle-password svg .slash {
			opacity: 0;
			transition: opacity 0.2s ease;
		}

		.toggle-password.visible svg .slash {
			opacity: 1;
		}

		.button-primary {
			width: 100%;
			border: none;
			border-radius: 16px;
			padding: 14px 18px;
			font-size: 1rem;
			font-weight: 600;
			color: #ffffff;
			background: linear-gradient(120deg, var(--primary) 0%, var(--primary-dark) 70%, var(--accent) 100%);
			cursor: pointer;
			box-shadow: 0 18px 45px rgba(47, 76, 235, 0.35);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.button-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 24px 60px rgba(47, 76, 235, 0.4);
		}

		.button-primary:disabled {
			opacity: 0.65;
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
		}

		.login-footnote {
			margin-top: 18px;
			display: flex;
			justify-content: space-between;
			font-size: 0.85rem;
			color: var(--text-muted);
		}

		.result {
			margin-top: 18px;
			padding: 14px 16px;
			border-radius: 14px;
			font-size: 0.9rem;
			display: none;
			border: 1px solid transparent;
		}

		.result.success {
			background: rgba(34, 197, 94, 0.12);
			color: #05603a;
			border-color: rgba(34, 197, 94, 0.25);
		}

		.result.error {
			background: rgba(248, 113, 113, 0.12);
			color: #9b1c1c;
			border-color: rgba(248, 113, 113, 0.25);
		}

		@media (max-width: 768px) {
			.login-card {
				border-radius: 24px;
			}

			.login-hero,
			.login-form-pane {
				padding: 32px 28px;
			}

			.hero-metrics {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}
		}
	</style>
</head>

<body>
	<div class="login-shell">
		<section class="login-card" aria-label="Secure employee login portal">
			<div class="login-hero">
				<div class="aurora"></div>
				<div class="login-hero-content">
					<div class="trust-chip">✨ The Lorry Workspace</div>
					<h1>Modern HR, Payroll, and Talent Operations in one place.</h1>
					<p>Sign in once to access your personalized dashboard, attendance records, payroll slips, leave balances, and AI copilot.</p>
				</div>
			</div>

			<div class="login-form-pane">
				<form id="login-form" class="login-form" aria-describedby="loginFootnote">
					<div class="brand-badge">Employee Management Suite</div>
					<h2>Welcome back</h2>
					<p>Use your corporate account credentials.</p>

					<div class="field-group">
						<label for="username">Username</label>
						<input type="text" id="username" name="username" class="input-field" placeholder="e.g., alex.ng" autocomplete="username" required>
					</div>

					<div class="field-group">
						<label for="password">Password</label>
						<div class="password-container">
							<input type="password" id="password" name="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required>
							<button type="button" id="toggle-password" class="toggle-password" aria-label="Show password">
								<svg viewBox="0 0 24 24">
									<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"></path>
									<circle cx="12" cy="12" r="3"></circle>
									<line class="slash" x1="4" y1="4" x2="20" y2="20"></line>
								</svg>
							</button>
						</div>
					</div>

					<button type="submit" class="button-primary" id="submit-btn">Sign in securely</button>

					<div id="result" class="result" role="alert"></div>
				</form>
			</div>
		</section>
	</div>

	<script>
		const form = document.getElementById('login-form');
		const resultBox = document.getElementById('result');
		const submitBtn = document.getElementById('submit-btn');
		const passwordInput = document.getElementById('password');
		const togglePassword = document.getElementById('toggle-password');

		togglePassword.addEventListener('click', () => {
			const shouldShow = passwordInput.type === 'password';
			passwordInput.type = shouldShow ? 'text' : 'password';
			togglePassword.classList.toggle('visible', shouldShow);
			togglePassword.setAttribute('aria-label', shouldShow ? 'Hide password' : 'Show password');
		});

		form.addEventListener('submit', async (event) => {
			event.preventDefault();
			resultBox.style.display = 'none';

			const payload = {
				username: form.username.value.trim(),
				password: form.password.value.trim()
			};

			if (!payload.username || !payload.password) {
				showResult('Both username and password are required.', false);
				return;
			}

			submitBtn.disabled = true;
			submitBtn.textContent = 'Authenticating…';

			try {
				const response = await fetch('/api/auth/login', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify(payload)
				});

				const data = await response.json();

				if (!response.ok) {
					const message = data?.message || 'Invalid credentials';
					showResult(message, false);
				} else {
					showResult(`Welcome ${data.username}! Redirecting to your dashboard…`, true);
					setTimeout(() => {
						window.location.href = '/dashboard.html';
					}, 900);
				}
			} catch (error) {
				showResult('Unable to reach server. Check if the backend is running.', false);
			} finally {
				submitBtn.disabled = false;
				submitBtn.textContent = 'Sign in securely';
			}
		});

		function showResult(message, success) {
			resultBox.textContent = message;
			resultBox.className = 'result ' + (success ? 'success' : 'error');
			resultBox.style.display = 'block';
		}
	</script>
</body>

</html>
